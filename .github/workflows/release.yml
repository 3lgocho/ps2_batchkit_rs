name: Publicar Batchkit Manager Universal

on:
  push:
    tags:
      - "v*.*.*" # Se activa solo al subir un tag (ej: v1.0.0)

jobs:
  build-and-release:
    name: Compilar App para ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            bin_name: ps2_batchkit_rs
            out_name: batchkit-manager-linux
          - os: windows-latest
            bin_name: ps2_batchkit_rs.exe
            out_name: batchkit-manager-windows.exe

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: 🦀 Instalar Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 🔨 Compilar (Release)
        run: cargo build --release

      - name: 📦 Renombrar ejecutable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv target/release/${{ matrix.bin_name }} ${{ matrix.out_name }}

      - name: 📦 Renombrar ejecutable (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/release/${{ matrix.bin_name }} ${{ matrix.out_name }}

      - name: 🚀 Subir a GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: batchkit-manager-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}